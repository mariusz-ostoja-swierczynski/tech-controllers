name: 'Autolabeler'

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  autolabel:
    name: 'Autolabel PR'
    permissions:
      pull-requests: write
    runs-on: 'ubuntu-latest'
    timeout-minutes: 3
    steps:
      - uses: release-drafter/release-drafter/autolabeler@v7
